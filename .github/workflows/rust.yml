name: Rust

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --workspace

  release-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev xz-utils

      - name: Install npm dependencies
        run: npm ci

      - name: Build Folding-OS artifacts
        run: ./scripts/build-folding-os-artifacts.sh "${GITHUB_REF_NAME#v}"

      - name: Build Debian packages
        run: ./scripts/build-debs.sh "${GITHUB_REF_NAME#v}"

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foldops-folding-os-${{ github.ref_name }}
          path: |
            target/release/foldops-agent
            target/release/foldops-supervisor
            target/debian/*.deb
            packaging/staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/foldops-agent
            target/release/foldops-supervisor
            target/debian/*.deb
            packaging/staging/*.tar.xz
          generate_release_notes: true
